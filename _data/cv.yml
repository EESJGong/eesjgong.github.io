    Experience:
      - company: South China University of Technology
        position: Project Lead / First Author, Research on Text-to-CAD Generation
        location: Guangzhou, China
        start_date: 2024-01
        end_date: present
        summary: Research on long-horizon Text-to-CAD generation with a focus on structured, controllable, and executable 3D/CAD synthesis.
        highlights:
          - "Studied long-horizon Text-to-CAD generation with a focus on maintaining assembly coherence and geometric constraints."
          - "Developed a modular three-stage pipeline that maps natural language instructions to geometric decomposition graphs, CAD action sequences, and executable bpy code."
          - "Explored structure-aware progressive curriculum learning to improve robustness on complex, highly constrained CAD assemblies."
          - "Positioned the system as an LLM-driven structured generation framework with strong controllability and execution fidelity."

      - company: Independent Open-Source Project (ScholarSkill)
        position: Project Lead / Open-Source Developer, OpenClaw Skill Development for Academic Reading and Knowledge Evolution
        location: Remote
        start_date: 2025-01
        end_date: present
        summary: Open-source development of an OpenClaw skill for structured academic reading and knowledge evolution.
        highlights:
          - "Developed ScholarSkill, an OpenClaw skill for building an Obsidian-centered academic reading workflow, aimed at turning paper reading into an evolving knowledge system rather than one-off summaries."
          - "Designed workflow modules for structured paper reading, knowledge linking, cognitive revision, and critical thinking."
          - "Integrated the project into the OpenClaw skill ecosystem with bilingual packaging and dependency-based setup for practical scholarly agent workflows in Obsidian."

      - company: South China University of Technology
        position: Project Lead / First Author or Co-First Author, Research on 3D Digital Humans and Talking Head Generation
        location: Guangzhou, China
        start_date: 2023-01
        end_date: 2025-01
        summary: Research on speech-driven 3D facial animation and Gaussian-based talking head generation.
        highlights:
          - "Worked on speech-driven 3D facial animation and Gaussian-based talking head generation."
          - "Investigated lip-sync, motion completion, full-face synthesis, identity generalization, and real-time rendering."
          - "Built a coherent research trajectory from digital humans to general 3D generative modeling and neural rendering."

      - company: South China University of Technology; China Unicom Guangdong
        position: Project Lead / Research Developer, Research on Vision Inspection and Industrial Anomaly Detection
        location: Guangzhou, China
        start_date: 2023-01
        end_date: 2025-01
        summary: Research on OCR, object detection, and industrial visual inspection for enterprise-oriented anomaly detection.
        highlights:
          - "Conducted research on OCR, object detection, and industrial visual inspection, covering both scene text/digit detection and enterprise-oriented anomaly detection tasks."
          - "Improved DBNet for scene text and digit detection by integrating SE and CBAM modules, and carried out model design, experiments, ablation studies, and paper writing."
          - "Participated in an industry-sponsored project with China Unicom Guangdong, developing an AI-based visual quality inspection pipeline for telecom site maintenance images."
          - "Built a multi-stage inspection workflow combining object detection, region-level classification, and OCR-based label verification, achieving site inspection accuracy above 95% with miss rate below 5%."

      - company: South China University of Technology
        position: Project Lead / First Author, Research on Computational Social Choice
        location: Guangzhou, China
        start_date: 2021-01
        end_date: 2024-01
        summary: Research on multi-stage multi-winner voting from an axiomatic perspective.
        highlights:
          - "Studied multi-stage multi-winner voting from an axiomatic perspective."
          - "Focused on formal analysis, theorem-oriented reasoning, and empirical validation."

